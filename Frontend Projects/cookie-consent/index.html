<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>
    <main>
        <h1>Cookie Consent Banner</h1>
        <p>We use cookies to make the site work better for you. You can accept or decline and your choice will be
            remembered for your next visit.</p>
    </main>

    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-content">
            <strong>Cookie notice:</strong> This site uses cookies to personalize content and analyze traffic. Accept to
            continue.
        </div>
        <div class="cookie-actions">
            <button id="declineCookies" type="button">Decline</button>
            <button id="acceptCookies" type="button">Accept</button>
        </div>
    </div>
</body>

</html>
