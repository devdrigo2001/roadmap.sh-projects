<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip UI</title>
  <link  rel="stylesheet" href="style.css">   
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="tooltip-wrapper">
        <div class="tooltip" data-tooltip="A short description shown on hover.">Hover me</div>
        <div class="tooltip" data-tooltip="A second tooltip with longer explanatory text.">More info</div>
        <div class="tooltip" data-tooltip="Lightweight tooltip styling without JavaScript.">Tip</div>
      </div>
    </section>
  </div>
</body>
</html>
