<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Atualizar Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="form">
      <h2>Atualizar Perfil</h2>

      <label for="full-name">Nome Completo</label>
      <input type="text" id="full-name" placeholder="John Doe">

      <label for="email">Email</label>
      <input type="email" id="email" value="raxd@sofware.com" class="error">
      <div class="error-message">Email já está em uso</div>

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="XXXXXXXX">

      <label for="confirm-password">Confirmar Senha</label>
      <input type="password" id="confirm-password" placeholder="XXXXXXXX">

      <button class="btn">Atualizar Perfil</button>
    </div>

    <div class="progress">
      <div class="circle">65%</div>
      <h3>Completo do Perfil</h3>
      <ul class="tasks">
        <li class="done">Criar Conta</li>
        <li class="done">Atualizar Roadmap</li>
        <li class="done">Configurar Perfil Público</li>
        <li>Completar seu primeiro projeto</li>
        <li>Convidar seus amigos</li>
      </ul>
    </div>
  </div>

</body>

</html>
