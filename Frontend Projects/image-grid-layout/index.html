<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Image Grid Layout</title>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Image Grid Layout</h1>
        <p class="lead">A simple responsive CSS grid for image cards</p>
      </div>
      <div style="color:var(--muted);font-size:0.9rem">Resize to view less</div>
    </header>

    <main>
      <section class="grid">
        <!-- sample cards: replace src with your images -->
        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/400?random=1" alt="Random image 1" />
          <div class="meta">
            <h3>Beautiful Landscape</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>

        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/400?random=2" alt="Random image 2" />
          <div class="meta">
            <h3>City at Night</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>

        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/800?random=3" alt="Random image 3" />
          <div class="meta">
            <h3>Tall Pines</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>

        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/400?random=4" alt="Random image 4" />
          <div class="meta">
            <h3>Seaside</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>

        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/400?random=5" alt="Random image 5" />
          <div class="meta">
            <h3>Minimal Interior</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>

        <article class="card">
          <img class="thumb" src="https://picsum.photos/600/400?random=6" alt="Random image 6" />
          <div class="meta">
            <h3>Mountain View</h3>
            <p>Photo by Picsum</p>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
